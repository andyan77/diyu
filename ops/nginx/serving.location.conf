# KS-CD-003 · diyu-serving 三条 location（人工 include 到 /etc/nginx/sites-available/kb.diyuai.cc）
#
# 红线 / red lines：
#   - 前缀必须与 diyu-agent 的 /api/v1/integrations/... 完全不重叠
#   - proxy_pass 必须指向 127.0.0.1:8005（diyu-serving 容器宿主侧端口）
#   - 禁止指向 127.0.0.1:8004（那是 diyu-agent）或 /（会覆盖既有路由）
#
# Include 方法（ECS root 操作）：
#   1) cp ops/nginx/serving.location.conf /etc/nginx/snippets/diyu-serving.conf
#   2) 在 /etc/nginx/sites-available/kb.diyuai.cc 的 server { ... } 块内加 include 行：
#        include /etc/nginx/snippets/diyu-serving.conf;
#   3) nginx -t && systemctl reload nginx
#
# 回滚 / rollback：删除 include 行 + reload，diyu-agent 路由零影响

location /v1/retrieve_context {
    proxy_pass http://127.0.0.1:8005;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
}

location /v1/guardrail {
    proxy_pass http://127.0.0.1:8005;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 10s;
    proxy_send_timeout 10s;
}

location /internal/context_bundle_log {
    proxy_pass http://127.0.0.1:8005;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 10s;
    proxy_send_timeout 10s;
    # /internal/* 仅允许 ECS 本机 + Dify Cloud 出口 IP；严控外网直接写日志
    # 注：实际 allow/deny 由总 server 块 + cloudflared / WAF 兜底；本片段先开放，
    # 由 KS-PROD-002 跨租户回归之后补 allow list（W12 任务）
}
