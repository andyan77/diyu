  - Collection
  - FabricKnowledge
  - CraftKnowledge
  - StylingRule
  - DisplayGuide
  - TrainingMaterial
  - RoleProfile
  - Persona
  - ContentType
  - PlatformTone
  - PrivateOutletChannel
  - InventoryState
  - CustomerScenario
  - CallMapping
  - Evidence

core_field_groups:
  product_basic:
    - product_id
    - name
    - category
    - attributes
  fabric:
    - fabric_name
    - hand_feel
    - drape
    - opacity
    - thermal
    - care_threshold
    - risk_alerts
  craft:
    - craft_feature
    - quality_signal
    - failure_signal
  rule:
    - applicable_when
    - success_scenario
    - flip_scenario
    - alternative_boundary
  inventory_state:
    - state_label
    - main_item_available
    - accessory_available
  customer_scenario:
    - trigger_phrase
    - first_judgment
    - blockers
  evidence:
    - source_md
    - source_anchor
    - evidence_quote

allowed_relation_kinds:
  - has_attribute
  - belongs_to_category
  - uses_fabric_knowledge
  - uses_craft_knowledge
  - governed_by_rule
  - supports_training
  - supports_display
  - supports_styling
  - requires_inventory_state
  - fits_customer_scenario
  - spoken_by_role
  - compatible_with_content_type
  - mapped_to_runtime
  - supported_by_evidence

allowed_pack_types:
  - fabric_property
  - craft_quality
  - styling_rule
  - display_rule
  - service_judgment
  - inventory_rescue
  - training_unit
  - product_attribute

pack_type_to_object_type:
  fabric_property:
    primary: FabricKnowledge
    related: [Product, Attribute, TrainingMaterial, StylingRule]
  craft_quality:
    primary: CraftKnowledge
    related: [Product, TrainingMaterial, DisplayGuide]
  styling_rule:
    primary: StylingRule
    related: [Product, Attribute, CustomerScenario, InventoryState]
  display_rule:
    primary: DisplayGuide
    related: [Product, Category, InventoryState, StylingRule]
  service_judgment:
    primary: [CustomerScenario, TrainingMaterial]
    related: [RoleProfile, Product, StylingRule]
  inventory_rescue:
    primary: [InventoryState, StylingRule, DisplayGuide]
    related: [Product, CustomerScenario]
  training_unit:
    primary: TrainingMaterial
    related: [RoleProfile, StylingRule, DisplayGuide, InventoryState]
  product_attribute:
    primary: [Product, Category, Attribute]
    related: [StylingRule, DisplayGuide]

forbidden_objects:
  note: |
    不得临时新增 core_object_types 之外的对象。
    无法挂靠的内容必须写入 skeleton_gap_register.csv，等待人工裁决，不得直接落 9 表。

unresolved_gaps:
  - gap_id: GAP-001
    surface_concept: MerchandisingSkill（陈列搭配技能）
    appears_in:
      - Q7Q12-搭配陈列业务包/陈列方法包.md
      - Q7Q12-搭配陈列业务包/面料工艺品质判断包.md
    why_unresolved: |
      素材中以 "技能" 实体出现，但 core_object_types 暂无对应槽位。
      首批按 "DisplayGuide + StylingRule + TrainingMaterial 组合视图" 处理，不立独立对象。
    decision: defer_to_human

  - gap_id: GAP-002
    surface_concept: styling_scenario_list（搭配场景清单）
    appears_in:
      - Q7Q12-搭配陈列业务包/门店接客场景包.md
    why_unresolved: |
      作为 CustomerScenario 的清单视图，暂归 CustomerScenario 子集，不立独立对象。
    decision: subsume_into_CustomerScenario

  - gap_id: GAP-003
    surface_concept: care_label（洗护标 / care claim）
    appears_in:
      - Q7Q12-搭配陈列业务包/面料工艺品质判断包.md
    why_unresolved: |
      作为 FabricKnowledge / Product 的字段而非独立对象处理。
      若后续频繁作为独立判断主体，再升格。
    decision: subsume_into_field
