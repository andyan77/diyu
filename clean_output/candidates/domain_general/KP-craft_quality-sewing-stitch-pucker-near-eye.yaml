knowledge_assertion: >-
  缝制质量（线迹 / 跳针 / 缝口起皱）是"近看质感工艺"——顾客不一定会说 seam puckering，
  但她一定能看出"这件怎么有点抽、歪、鼓、皱"；
  门店要把缝口起皱定位为面料结构 + 缝型 + 针线规格 + 送布问题的综合症状，
  不是单线问题，更不是顾客挑剔。

scenario:
  who:
    primary_role: 门店导购 / sample_worker（样衣工）/ merchandising_director
    target_audience: 近距离看款的顾客；店员需要解释"为什么这条线看着抽""为什么缝口鼓"的场景
  when:
    trigger: 顾客指出某条缝看着抽 / 歪 / 鼓 / 皱；或导购近距离做品质讲解
    context: 衬衫领口 / 门襟 / 袖口 / 裤头 / 裙腰等近看缝口位
  what:
    action_type: craft_quality_signal_recognition_and_explanation
    decision_or_action: |
      把"线看着抽 / 缝口鼓 / 歪皱"识别为缝口起皱的可见信号；
      解释为面料结构 + 缝型 + 针线规格 + 送布问题的综合症状，而非单纯线松紧；
      抽 / 鼓 / 皱明显的款不许用"做工讲究 / 精细"卖点；
      可控范围内的轻微起皱可结合面料特性做坦诚说明。
  result:
    success_pattern: |
      导购能识别并坦诚说出原因，顾客认为店员"懂行"，不视为质量黑点；
      明显失败品被识别后调整推荐或下线。
    flip_pattern: |
      把缝口起皱归为"线没拉好"或反驳"这是设计感" → 顾客认为是品控差或被糊弄；
      把起皱明显的款仍卖"做工讲究" → 信任度受损。
  underlying_mechanism: |
      seam puckering 由四源驱动：fabric structure（面料结构松紧 / 弹性）/ seam construction（缝型对面料的剪切）/ thread / needle size（针线规格相对面料的粗细）/ feeding problems（上下送布同步差异）；
      任何一项不匹配都会产生起皱。
  boundary:
    applicable_when: 衬衫 / 西装 / 西裤 / 礼服等近看质感款；任何顾客或店员对缝口起皱的疑问
    not_applicable_when: |
      故意做褶皱 / 风琴褶设计款（区分于工艺缺陷）；
      远观陈列道具款。
  alternative_path:
    - 如果起皱来自面料 → 同步说明面料属性，建议顾客接受微皱
    - 如果起皱来自针线规格不当 → 同款不同批可能差异 / 推荐其他批次
    - 如果起皱明显且影响穿着 → 直接换款或调换码

