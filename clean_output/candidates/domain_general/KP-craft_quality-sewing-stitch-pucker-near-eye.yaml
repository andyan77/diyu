  evidence_quote: |
    这组正式定义为"近看质感工艺"。
    顾客不一定会说 seam puckering 这个词，但她一定能看出"这件怎么有点抽、歪、鼓、皱"。
    Coats 对 seam puckering 的说明很清楚：它不只是线的问题，
    还和 fabric structure、seam construction、thread / needle size 以及 feeding problems 有关。

