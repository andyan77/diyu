pack_id: KP-styling_rule-daily-fragment-no-face-traces
granularity_layer: L2
production_tier: instant
default_call_pool: true

play_card:
  consumption_purpose: generation
  production_difficulty: low
  resource_baseline: "1人+手机+200元+4h"
  hook: "不露脸只拍生活留下的痕迹让人自然出现"
  steps:
    - "选衣物钥匙水杯等生活痕迹"
    - "避开正脸只拍物件状态"
    - "用最后一个痕迹暗示人物情绪"
  anti_pattern: "为了信息完整强行露脸讲解破坏靠近感"
  duration: short
  audience: "喜欢安静生活碎片的人群"
  source_pack_id: KP-styling_rule-daily-fragment-no-face-traces

schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  daily_fragment 内容里，"不拍脸 / 只拍生活留下的痕迹"是一条强力突破玩法——
  椅背上的外套 / 刚摘下的耳环 / 收银台边的一杯水 / 试衣间地上的纸袋 /
  回家后放下的钥匙 / 洗过的衬衫在窗边滴水。观众不会觉得"信息不足"，反而更想靠近，
  因为人是通过痕迹出现的。服装天然是最容易留下痕迹的物件——衣架空位 / 刚脱下的针织 /
  试穿留下的褶皱都是很强的"服装性痕迹"。本卡打破"日常碎片必须有自拍和本人出镜"的套路。

scenario:
  who:
    primary_role: daily_fragment 内容创作者 / 服装品牌内容主理人
    target_audience: AI 内容生产组装者（按 ContentType=daily_fragment 选卡时）
  when:
    trigger: 决定做日常碎片但不想出镜 / 想做更私密更可信的内容时
    context: daily_fragment 最易翻车是"配热门歌的碎片拼盘"或"九宫格 Plog"——本卡用"痕迹叙事"反向破题
  what:
    action_type: content_play_card_anchor
    decision_or_action: 30 秒：6 个物件痕迹近景 + 极少字幕 + 低语感收音 + 留白
  result:
    success_pattern: |-
      椅背外套 → 桌角耳环 → 柜台半杯水 → 试衣间纸袋 → 门口钥匙 → 窗边滴水衬衫
      → 观众产生比"自拍碎片"更私密更可信的存在感 / 服装作为情绪痕迹被自然接住
    flip_pattern: |-
      把痕迹做成"商品陈列特写 / 美学摆拍" / 加热门歌 + AI 一键剪 → 退化为 C1 拼盘
      → 痕迹变成装饰素材，丢失"人通过痕迹出现"的核心
  underlying_mechanism: |
      日常碎片的真正抓力不在画面密度而在"不解释的存在感"。物件痕迹让观众用自己的经验
      补全意义——比自拍碎片信息密度更低但情绪密度更高。服装是日常物件中最易留下时间痕迹
      的品类（褶皱 / 磨损 / 摆放方式）/ 这是服装行业内容化"陪伴感"的独占空间。
  boundary:
    applicable_when: 1 人 1 手机 / 4 小时内 / 想做更私密的内容 / 想用服装做情绪载体
    not_applicable_when: 需要清晰说明性内容（教程 / 信息）→ 走 knowledge_sharing / 需要露脸建立人格 → 走 personal_vlog
  alternative_path:
    - 与 C3-3 "碎片按体感排"配合——本卡按"物件类型"组，体感卡按"软/吵/静"组
    - 与 C3-4 "六声一日"配合——本卡走视觉痕迹，六声走声音痕迹

evidence:
  source_md: Q2-内容类型种子/daily_fragment-交付物-v0.1.md
  source_anchor: §C3 突破性玩法卡 #C3-2 "没有脸的生活痕迹"
  source_type: explicit_play_card
  inference_level: low
  evidence_quote: |
    C3-2：整条内容不拍脸，只拍生活留下的痕迹：椅背上的外套、刚摘下的耳环、收银台边的一杯水、
    试衣间地上的纸袋、回家后放下的钥匙、洗过的衬衫在窗边滴水。
    观众不会觉得"信息不足"，反而更想靠近，因为人是通过痕迹出现的——接住一种更私密、更可信的存在感。
    服装天然是最容易留下痕迹的物件：衣架上的空位、刚脱下的针织、试穿留下的褶皱。
    打破"日常碎片必须有自拍和本人出镜"的套路。

gate_self_check:
  gate_1_closed_scenario: pass
  gate_2_reverse_infer: pass
  gate_3_rule_generalizable: pass
  gate_4_production_feasible: pass
  notes: |
    Gate 1：八要素齐全。
    Gate 2：从 06_rule + 05_relation（compatible_with_content_type=daily_fragment）+ 09_call_mapping 可反推
    "daily_fragment 用 6 物件痕迹近景+留白 / 与拼盘的边界 / 服装作为痕迹载体的钩子"。
    Gate 3：跨品牌通用——任何品牌都可借此做"陪伴感"内容。
    Gate 4：可被 content_generation 调用，按"日常物件痕迹清单"生成分镜候选。

