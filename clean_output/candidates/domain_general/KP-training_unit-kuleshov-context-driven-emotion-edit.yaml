  title: "上下文情绪剪辑镜头"
  summary: "通过前后镜头上下文改变同一表情或衣物动作的情绪含义，形成可复用剪辑模板。"
  source_pointer: "candidates/.../KP-training_unit-kuleshov-context-driven-emotion-edit.yaml#runtime_asset"

