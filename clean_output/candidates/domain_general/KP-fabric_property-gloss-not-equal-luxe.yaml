  asset_type: role_split
  title: "光泽廉价风险判断"
  summary: "把显贵光泽和显廉价光泽拆成门店推荐前的判断分工，防止亮面材质被误推。"
  source_pointer: "candidates/.../KP-fabric_property-gloss-not-equal-luxe.yaml#runtime_asset"

schema_version: candidate_v1
pack_type: fabric_property
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  "有光泽"不等于"显贵"——光泽会同步放大体表痕迹、褶印、贴肉和廉价感；
  推荐前必须区分"显贵光泽"vs"显廉价光泽"，不是所有亮度都加分。

scenario:
  who:
    primary_role: 门店导购 / product_professional
    target_audience: 被光泽吸引并默认"亮 = 高级"的顾客；导购把光泽当通用加分项的场景
  when:
    trigger: 顾客或导购把光泽等同于显贵
    context: 真丝 / 醋酸缎 / 涤纶仿丝缎 / 高密涤纶 / PU 涂层款
  what:
    action_type: misjudgment_correction_gloss_eq_luxe
    decision_or_action: |
      把"光泽"重新定位为放大器属性——显贵和显廉价它都会放大；
      区分两类光泽：自然柔和光（真丝 / 重磅缎）vs 塑料反光（薄聚酯 / 廉价涂层）；
      推荐前评估顾客体表敏感度 + 灯光环境；
      塑料反光款不许喊"高级 / 显贵"。
  result:
    success_pattern: |
      顾客接受"光泽是放大器"概念，按自身条件选自然柔和光款；
      避开塑料反光款无显廉价投诉。
    flip_pattern: |
      把任何光泽卖成"显贵" → 顾客买回家在自然光下看到塑料感 → 退换或差评；
      把光泽卖给体表敏感顾客而未提示放大效应 → 上身后体表痕迹明显 → 退换。
  underlying_mechanism: |
      光泽来自表面光反射；自然光泽来自纤维结构（真丝棱镜 / 高支棉）—— 漫反射均匀；
      塑料反光来自合成纤维表面或涂层 → 镜面反射强烈；
      高反光均会放大体表凸起 / 褶印 / 贴肉。
  boundary:
    applicable_when: 任何含光泽款；店员或顾客把光泽当加分项的场景
    not_applicable_when: |
      明确做"金属光泽 / 派对款"的非"显贵"语境；
      展示道具用陈列。
  alternative_path:
    - 如果顾客真要"显贵" → 推荐自然柔和光款（重磅真丝 / 醋酸缎）
    - 如果顾客在意体表痕迹 → 转向哑光仿缎或带肌理款
    - 如果是塑料反光款 → 改卖点为"派对 / 短时穿着 / 视觉亮点"

