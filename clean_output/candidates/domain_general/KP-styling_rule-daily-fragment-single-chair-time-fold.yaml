pack_id: KP-styling_rule-daily-fragment-single-chair-time-fold
granularity_layer: L2
production_tier: long_term
default_call_pool: true

play_card:
  consumption_purpose: generation
  production_difficulty: medium
  resource_baseline: "2-3人+轻设备+1000元+1-2天"
  hook: "同一把椅子四次出现拍出一天的陪伴感"
  steps:
    - "固定椅子机位分四个时段拍摄"
    - "每次只放下一件物品停两秒"
    - "结尾用空椅子收住情绪"
  anti_pattern: "把椅子当普通摆拍道具而没有时段变化"
  duration: medium
  audience: "喜欢慢节奏生活叙事的人群"
  source_pack_id: KP-styling_rule-daily-fragment-single-chair-time-fold

schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  daily_fragment 内容里，"同一把椅子四次"是一条用**单地点 + 时段道具替身**
  在 4 小时内拍完的"陪伴感"碎片玩法——手机固定拍一把椅子或店里的试衣凳，
  早上椅子上是一件外套（出门）；中午是一杯喝到一半的咖啡（撑住）；
  傍晚是一只购物袋（松一口气）；夜里是一盏小灯照着空椅子（回到自己）。
  每次出现你都只露出手：把东西放下、停两秒、又拿走。
  服装在此作为"情绪载体"出现（外套 = 出门的勇气），而不是商品——
  这是品牌把 daily_fragment 做成"温柔叙事"且**不需 long_term 跨日素材**的入口。

scenario:
  who:
    primary_role: daily_fragment 内容创作者 / 服装品牌内容主理人
    target_audience: AI 内容生产组装者（按 ContentType=daily_fragment 单日完成卡时）
  when:
    trigger: 想做陪伴感但创作者只能在单日 4 小时内完成 / 品牌想做"温柔叙事"
    context: daily_fragment C3-1 是 long_term 跨日，本卡是单日时段折叠——为单条 4 小时基线提供单日替代
  what:
    action_type: content_play_card_anchor
    decision_or_action: 单机位 + 4 个时段（清晨/中午/傍晚/夜）+ 4 件道具替身 + 只露手 + 每次停 2 秒 + 弱字幕
  result:
    success_pattern: |-
      0-7 清晨椅子+外套+字幕"出门" → 7-15 中午半杯咖啡+字幕"撑住" →
      15-23 傍晚购物袋+字幕"松一口气" → 23-30 夜里小灯照空椅+字幕"回到自己"
      → 观众脑补完"你的一天" → 服装作为情绪载体被自然接住
    flip_pattern: |-
      把椅子换成商品陈列摆拍 / 字幕讲产品卖点 / 加 BGM 顶节奏
      → 退化为"商品摆拍碎片"，丢失"我也有一把椅子装着我的一天"的共鸣
      或拍成"店内 vlog"加旁白 → 滑向 store_daily 而非 daily_fragment
  underlying_mechanism: |
      daily_fragment 真正的抓力是"用单点重复表达时间"。同一把椅子四次让"时间"
      自己说话——道具替身（外套 / 咖啡 / 购物袋 / 灯）承担情绪叙事，
      手作为"人存在过的证据"。服装在这里不是"被穿"而是"被放下"——
      这是服装情绪化叙事的独占语法，与 OOTD"穿在身上展示"完全相反。
  boundary:
    applicable_when: 1 人 1 手机 / 4 小时内完成 / 单日就能拍完 / 预算 0 / 剪辑极省
    not_applicable_when: 想跨日捕捉变化 → C3-1 同一角落 5-7 天 / 想出镜建人格 → personal_vlog / 想拍商品 → OOTD 或 product_review
  alternative_path:
    - 与 C3-1 跨日重复版形成"单日 vs 跨日"二维分工
    - 与 C3-2 不拍脸痕迹版互补：本卡走"时段道具替身"，C3-2 走"物件痕迹近景"

evidence:
  source_md: Q2-内容类型种子/daily_fragment-交付物-v0.1.md
  source_anchor: §C3-5 同一把椅子四次（单地点时间折叠）
  source_type: explicit_play_card
  inference_level: low
  evidence_quote: |
    C3-5：手机固定拍一把椅子或店里的试衣凳。早上椅子上是一件外套；中午是一杯喝到一半的咖啡；
    傍晚是一只购物袋；夜里是一盏小灯照着空椅子。每次出现你都只露出手：把东西放下、停两秒、又拿走。
    观众不会看到你的行程，但会在脑子里补完"你的一天"——接住"我也有一把椅子装着我的一天"。
    服装钩子：服装作为"情绪载体"出现（外套 = 出门的勇气）——极适合做品牌的温柔叙事。
    打破"碎片必须多地点"，用单地点做时间结构。

