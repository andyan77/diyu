pack_id: KP-styling_rule-one-focus
granularity_layer: L1
schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  一套里只留一个主角：颜色、版型、材质、设计四选一——零售穿搭不是造型比赛，
  哪里都厉害最后哪里都不好卖；舞台造型与时装表达型内容不在此限。

scenario:
  who:
    primary_role: 导购 / 店长
    target_audience: 绝大多数顾客，尤其第一次种草、连带销售场景
  when:
    trigger: 接客推荐 / 上身搭配定稿 / 担心顾客被"穿太满"劝退
    context: 整套搭配的视觉焦点选择
  what:
    action_type: single_focus_decision
    decision_or_action: |
      四选一：颜色主角 / 版型主角 / 材质主角 / 设计主角；
      其余单品全部降噪做基础与衬托；主角断货时替代必须保留主角功能。
  result:
    success_pattern: 顾客一眼锁定主角后愿意成交，其余单品作为延展连带成立。
    flip_pattern: 亮片上衣 + 花裙 + 金属鞋 + 大耳环——画面满，但顾客无法决定看哪里，最终不下单。
  underlying_mechanism: |
      门店成交是"减少决策成本"的过程；
      多焦点等于无焦点，顾客的视线没有落点，购买动机就找不到出口。
  boundary:
    applicable_when: 第一次种草 / 连带销售 / 通勤盘 / 安全成交盘
    not_applicable_when: 舞台造型 / 时装表达 / 强风格内容片
  alternative_path:
    - 主角断货 → 替代保留"主角功能"（如颜色主角→换同饱和度同位置的另一件）
    - 其他单品继续降噪，不顺势叠新焦点

evidence:
  source_md: Q7Q12-搭配陈列业务包/搭配规则包.md
  source_anchor: 6.1 规则 04 one_focus_rule + 6.2 hard_rule
  source_type: explicit_business_rule
  inference_level: low
  evidence_quote: |
    一套里只留一个主角：颜色主角、版型主角、材质主角、设计主角，四选一。
    零售穿搭不是造型比赛；哪里都厉害，最后往往哪里都不好卖。
    works_in：亮色外套 + 基础内搭；设计感上衣 + 干净下装。
    fails_in：亮片上衣 + 花裙 + 金属鞋 + 大耳环。
    主角断货时，替代保留"主角功能"，其他单品继续降噪。

