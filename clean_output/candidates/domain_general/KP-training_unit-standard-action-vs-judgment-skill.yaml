pack_id: KP-training_unit-standard-action-vs-judgment-skill
granularity_layer: L3

runtime_asset:
  runtime_asset_id: RA-training_unit-standard-action-vs-judgment-skill
  asset_type: action_template
  title: "标准动作判断力拆分"
  summary: "先区分标准动作和判断力两类训练，再分别设计手部动作和情境演练。"
  source_pointer: "candidates/.../KP-training_unit-standard-action-vs-judgment-skill.yaml#runtime_asset"

schema_version: candidate_v1
pack_type: training_unit
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  门店技能必须先拆成 standard_action（标准动作）与 judgment_skill（判断力）两类再设计培训：
  标准动作类（折叠 / 挂装 / 蒸烫 / 试衣前递衣顺序等）必须拍成手部+空间动作做 Do/Don't；
  判断力类（顾客顾虑判断 / 身型与比例判断 / 库存救场该救还是该转等）必须放进情境演练，
  不能只给标准答案——混到一起练，两边都练不出来。

scenario:
  who:
    primary_role: 培训内容设计方 / 店长
    target_audience: 一线员工（导购 / 新人 / 仓库主管）
  when:
    trigger: 设计任一新培训单元；评估老培训为什么"教了还是不会"
    context: 服装零售门店，胜负往往在几秒钟的判断点 + 大量手部空间动作
  what:
    action_type: training_format_split
    decision_or_action: |
      错误动作：把所有培训都做成统一格式（PPT 或视频或脚本演练），
        判断类的内容硬塞进标准动作模板，或反过来把标准动作只做口播。
      正确动作：第一步先把单元打标 standard_action 还是 judgment_skill；
        standard_action → before_after_timelapse / do_dont_contrast，拍手部动作 + 空间动作；
        judgment_skill → branching_scenario / error_replay，店长口头给情境，员工现场判断。
      为什么错：服装零售大量技能是手部和空间动作，不适合只口播；
        判断点抽象规范练不出，必须放进真实情境。
      如何纠正：用本规则重审现有单元，错位的格式立刻改型。
      掌握检查：员工被现场抽测时，标准动作类无漏项重做出来；判断类能 30 秒说出判断顺序 + 1 分钟说行动方案。
  result:
    success_pattern: |
      标准动作类员工能直接重做且达标；
      判断类员工能先判断顾虑再给方案，不会套万能话术；
      培训完成度与现场执行率同时上升。
    flip_pattern: |
      把判断类做成 PPT 标准答案 → 员工现场套话术、不会真判断；
      把标准动作只做口播 → 员工"听过"但手上做不出来；
      两边培训都白做。
  underlying_mechanism: |
      技能类型决定培训介质：动作类必须身体记忆（看+做+反馈），判断类必须情境记忆（变量+权衡+复盘）；
      格式错配 = 把记忆通道堵死。
  boundary:
    applicable_when: 任何门店一线培训单元设计 / 老单元改型
    not_applicable_when: |
      混合型单元（既含标准动作又含判断点，如 inventory_rescue_at_counter）→ 拆成两段分别训练，
      不要硬归一类。
  alternative_path:
    - 单元同时含标准动作 + 判断 → 拆成两个子单元，各自匹配格式
    - 资源紧张 → 先保 judgment_skill 类（错配代价更高）
    - 新人入职 → 标准动作类先排，判断类用 8-12 周间隔复现逐步加码

evidence:
  source_md: Q7Q12-搭配陈列业务包/培训与纠错包.md
  source_anchor: 二、2.4 标准动作和判断力必须拆开 · 十、训练拆分策略
  source_type: explicit_business_decision
  inference_level: low
  evidence_quote: |
    standard_action（标准动作）：可以拍成固定步骤；
    judgment_skill（判断力）：必须放到情境里练。
    适合教标准动作的内容：折叠 / 挂装 / 蒸烫 / 吊牌检查 / 主推位补货 / 模特基础成套 /
    试衣前递衣顺序 / 面料触感演示动作 / 尾货位陈列 / 班前会 40 秒提醒结构。
    必须教判断力的内容：顾客真正顾虑的判断 / 身型和比例判断 / 颜色顾虑背后的场景判断 /
    面料解释顺序 / 搭配重心判断 / 陈列主次判断 / 库存救场时该救还是该转 /
    替代距离是否过远 / 什么时候该直接放弃推荐 / 哪个错误最值得当场纠正。

