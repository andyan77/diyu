pack_id: KP-display_rule-front-hanging-purpose
granularity_layer: L1
schema_version: candidate_v1
pack_type: display_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  front_hanging_display（正挂位）的业务目标是"让顾客一眼看懂今天主推哪件、产生拿取动作"——
  适合 new_arrival_complete / core_push_deep_stock / basic_replenishable 三类库存；
  最大的反例是"一排都是重点"——必须有第一主款，否则色序再顺顾客看完也不知道先试哪件。新人首批训练重点。

scenario:
  who:
    primary_role: 新人 / 老手陈列负责人
    target_audience: 进店一眼扫过的顾客
  when:
    trigger: 上新 / 主推切换 / 日常陈列维护
    context: 门店正面卖相强的挂杆位
  what:
    action_type: front_hanging_setup
    decision_or_action: 选第一主款 + 配套副推；同色系排序；保证款式样色都有货
  result:
    success_pattern: 顾客一眼锁定第一主款产生拿取动作，主推转化率提升
    flip_pattern: 一排都是重点 / 颜色风格长度乱 / 挂的是没货样子款 → 色序很顺但没有第一主款
  underlying_mechanism: |
      正挂是门店的"主推焦点位"；如果焦点不清，等于浪费了最有正面卖相的位置。
      Do/Don't 对照与日常复盘是最适合的训练形式。
  boundary:
    applicable_when: 正面卖相强的上衣/衬衫/连衣裙/西装外套/图案针织
    not_applicable_when: 折叠款（按 folded_display）；侧挂选择带（按 side_hanging_display）
  alternative_path:
    - 主推无货 → 临时下撤为侧挂选择带，不空挂样子款
    - 多个候选主推冲突 → 选一个进正挂，其他放正挂相邻位作副推

evidence:
  source_md: Q7Q12-搭配陈列业务包/陈列方法包.md
  source_anchor: 二、3. front_hanging_display + 三、5）适合培训新人
  source_type: explicit_business_decision
  inference_level: low
  evidence_quote: |
    业务目标：让顾客一眼看懂今天主推哪件，快速产生拿取动作。
    最容易犯的错：一排都是重点；颜色、风格、长度乱；挂的是没货样子款。
    什么叫"看着高级但卖不动"：色序很顺，但没有第一主款，顾客看完还是不知道先试哪件。
    培训层级：首批重点给新人训练。最适合 Do/Don't 对照和日常复盘。

gate_self_check:
