  source_md: Q2-内容类型种子/outfit_of_the_day-交付物-v0.1.md
  source_anchor: §C3 突破性玩法卡 #C3-3 "衣服记住了今天"
  source_type: explicit_play_card
  inference_level: low
  evidence_quote: |
    C3-3：从拍"穿上它"改成拍"它怎么被今天留下痕迹"：早上平整的裤线到下午坐久后的褶皱；
    刚出门时笔挺的衬衫到晚上领口松掉一点；包带在肩上压出的痕迹；牛仔裤膝盖处的弯曲。
    最后把衣服挂起来，OOTD 才真正完整。
    服装行业钩子⭐⭐⭐：对服装品牌极有杀伤力——天然把"耐看、耐穿、会呼吸"这类隐性价值拍出来。
    打破"OOTD 只拍穿上那一刻"的套路。

