  rationale_keep: "domain_general_keep · 启用与否非命名问题是抽象元规则；scan 误报：pack_id 含 founder 触发"
  rationale: 多品牌建模治理通用原则，与笛语品牌专属表达无关。
  faye_review_required: false
  splittable_components: []

