pack_id: KP-fabric_property-soft-not-equal-premium
granularity_layer: L1
schema_version: candidate_v1
pack_type: fabric_property
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  "软"只说明触感，不说明轮廓成立——
  软垂类面料必须同步判断贴肉、挂长、暴露体表痕迹三类风险，不能把"软"等同于"高级"。

scenario:
  who:
    primary_role: 门店导购 / product_professional
    target_audience: 试穿后说"好软""手感太好了"或导购把"软"当高级卖点的场景
  when:
    trigger: 顾客或导购把"软"作为推荐核心理由
    context: 软垂面料（粘胶 / 莫代尔 / 天丝 / 软真丝 / 软棉）裙装 / 衬衫 / 阔腿裤
  what:
    action_type: misjudgment_correction_soft_eq_premium
    decision_or_action: |
      把"软"重新定位为单一触感属性，不构成轮廓 / 高级判断；
      推荐前必须同步评估贴肉 / 挂长 / 暴露体表痕迹三类风险；
      高级判断改用面料表情 + 缝制 + 收口 + 光泽控制综合表达。
  result:
    success_pattern: |
      顾客接受"软是触感、不是高级"，按风险三项做选择；无"显胖"或暴露感投诉。
    flip_pattern: |
      把"软"等同"高级"卖给在意贴肉 / 挂长的顾客 → 上身后暴露体表 / 看着挂长 → 退换或差评。
  underlying_mechanism: |
      "软"是手感维度（弯曲刚度低）；"高级"是综合维度（面料 + 工艺 + 视觉 + 体面）；
      软垂面料因悬垂系数高同时带来贴肉与挂长。
  boundary:
    applicable_when: 软垂类面料任意品类；店员或顾客把"软"等同"高级"的场景
    not_applicable_when: |
      明确做"软糯亲肤短季节"卖点的款（不喊高级，软是核心点）；
      毛绒类（软是合理一手感卖点）。
  alternative_path:
    - 如果顾客真要"高级感" → 转向重磅缎 / 西装料 / 廓形面料并讲面料表情
    - 如果顾客就喜欢软触感 → 接受贴肉 / 挂长后选适合的款

evidence:
  source_md: Q7Q12-搭配陈列业务包/面料工艺品质判断包.md
  source_anchor: 六、首批高频误判 · 误判 1：把"软"当成"高级"
  source_type: explicit_business_decision
  inference_level: direct_quote
  evidence_quote: |
    正式纠偏：软只说明触感，不说明轮廓成立。软垂类面料要同步判断贴肉、挂长、暴露体表痕迹风险。
    落盘对象：StylingRule（搭配规则）、TrainingMaterial（培训材料）。

