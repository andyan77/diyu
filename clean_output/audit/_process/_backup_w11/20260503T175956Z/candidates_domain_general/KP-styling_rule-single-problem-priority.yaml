pack_id: KP-styling_rule-single-problem-priority
granularity_layer: L1
schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  接客时一次先解决顾客一个核心顾虑，不同时解决五个问题——成交不是"卖点堆满"而是"顾虑被减掉"；
  替代时也优先守住顾客最在意的那一个点。

scenario:
  who:
    primary_role: 全部导购
    target_audience: 全部顾客（所有门店）
  when:
    trigger: 接客对话开场 / 试穿后顾客提出第一个顾虑 / 顾客犹豫不决
    context: 导购卖点表达顺序选择
  what:
    action_type: single_concern_focus
    decision_or_action: |
      顾客说显胖就先解决显胖；说难搭就先解决难搭；
      原款缺货时替代必须优先守住顾客最在意的那一个点。
  result:
    success_pattern: 顾客单点顾虑被精准解决后愿意成交，连带可在第二轮接续。
    flip_pattern: 上来就说"显高显瘦显气质显贵显年轻"，顾客信息过载、决策瘫痪、不下单。
  underlying_mechanism: |
      门店成交是减法不是加法；
      多顾虑同时解决会被顾客理解为"哪个都没解决"，反而降低信任。
  boundary:
    applicable_when: 全部导购 / 全部门店 / 全部接客场景
    not_applicable_when: 无（用 source 原文："无"）
  alternative_path:
    - 原款缺货 → 替代必须优先守住顾客最在意的那一个点
    - 顾客无明确顾虑 → 用陈列分组（显高/显瘦/通勤/贵价救场）引导顾客先选一个

evidence:
  source_md: Q7Q12-搭配陈列业务包/搭配规则包.md
  source_anchor: 6.1 规则 12 single_problem_solving_rule + 6.2 hard_rule
  source_type: explicit_business_rule
  inference_level: low
  evidence_quote: |
    接客时一次先解决顾客一个核心顾虑，不同时解决五个问题。
    真正成交不是"卖点堆满"，而是"顾虑被减掉"。
    suitable_for：全部导购、全部门店。
    not_suitable_for：无。
    works_in：顾客说显胖，就先解决显胖；说难搭，就先解决难搭。
    fails_in：上来就说"显高显瘦显气质显贵显年轻"。
    原款缺货时，替代必须优先守住顾客最在意的那一个点。

