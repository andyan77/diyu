pack_id: KP-service_judgment-frontline-cover-public-and-private
schema_version: candidate_v1
pack_type: service_judgment
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  凡是首批与导购（styling_advisor）/ 门店经营（store_operator）强相关的内容线，
  其派生视图必须同时覆盖公域分发位（PlatformTone）与私域出口位（PrivateOutletChannel），
  不允许只做公域；这是冷启动唯一的硬约束规则，违反则该内容线视为"覆盖不全"，不得放行。

scenario:
  who:
    primary_role: 内容运营 / 派生视图引擎
    target_audience: 内容生产链路 / 渠道分发引擎
  when:
    trigger: 任意 styling_advisor 或 store_operator 主导的内容线进入派生视图计算
    context: 冷启动 P0 唯一硬规则
  what:
    action_type: frontline_channel_coverage_enforcement
    decision_or_action: 派生视图必须同时输出公域命中清单 + 私域命中清单，缺一则该内容线被标"覆盖不全"
  result:
    success_pattern: |
      导购的"试衣间一句话推荐"既出公域种草版（小红书 / 抖音），又出私域出口版（朋友圈 / 微信群），
      门店店长的经营观察既走视频号公域，也走微信社群私域；私域转化路径不会被漏掉。
    flip_pattern: |
      导购内容线只做公域种草，私域不出 → 试衣间内容生成出来发不到导购自己的朋友圈，
      最贴近成交的渠道反而最缺内容，门店转化掉队。
  underlying_mechanism: |
      导购与店长是离顾客最近的角色，他们的内容必须落到离顾客最近的渠道（私域出口位），
      只覆盖公域意味着把"最贴身的人"的内容推到"最远的渠道"，违背冷启动设计意图。
  boundary:
    applicable_when: styling_advisor / store_operator 主导的内容线
    not_applicable_when: product_professional 主导的纯品牌叙事内容线（公域为主即可）
  alternative_path:
    - 私域出口位还没接通 → 派生视图标"覆盖不全 - 私域待接入"，不放行该内容线
    - 内容确实不适合私域（如长视频纪录片）→ 走人工豁免，记录豁免原因，不默认放行

