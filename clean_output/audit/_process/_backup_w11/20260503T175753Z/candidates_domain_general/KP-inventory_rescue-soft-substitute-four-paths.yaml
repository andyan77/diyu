    R1 same_sku_other_color（同款异色）最优软替代
    R2 near_color_family（近色群替代）适合非强颜色锚定需求
    R3 same_occasion_same_silhouette（同场景同廓形异款）高质量转向型替代
    R4 same_item_new_pairing_piece（单品不变，搭配件替换）适合"主角单品仍成立"的情况

