  evidence:
    - {evidence_id: EV-KP-service_judgment-platform-derivation-not-source, source_md: Q4-人设种子/phase-3-Q4-参数级填充清单.md, source_anchor: 五 + 范围约束, source_type: explicit_business_decision, inference_level: low}
