  source_md: Q2-内容类型种子/emotion_expression-交付物-v0.1.md
  source_anchor: §C3 突破性玩法卡 #C3-1 "一件衣服替我说完今天没说出口的话" + §A 北极星 + §D 服装行业垂直机会
  source_type: explicit_play_card
  inference_level: low
  evidence_quote: |
    C3-1：镜头从回家开始。主角一句话不说，只是把外套从肩上慢慢脱下来 / 搭在椅背上 /
    过一会儿又拿起来抱在怀里坐着。背景只有电饭煲跳闸声 / 楼下车声 / 微信提示音但不看。
    字幕极少，只在最后出现一行："今天没有崩溃，只是一直没空掉下来。"
    这时候那件衣服不是商品也不是穿搭，而是"今天所有没被接住的情绪容器"。
    服装行业钩子⭐⭐⭐⭐⭐：服装是情绪载体而非主角商品——这是服装行业独占的"让衣服替主人活着"的叙事空间。
    §D：❌ "这件针织很温柔" → ✅ "有些人会把外套留在你椅背上"。

