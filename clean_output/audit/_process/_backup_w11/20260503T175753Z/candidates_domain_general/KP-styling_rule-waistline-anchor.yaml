pack_id: KP-styling_rule-waistline-anchor
schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  顾客诉求是显高、显瘦、显精神时，先找腰线——门店里大部分"不够精神"不是颜色错而是腰线没出来；
  腹部敏感不愿强调腰部的顾客除外。

scenario:
  who:
    primary_role: 导购 / 店长
    target_audience: 梨形 / H 型 / 小个子 / 产后体型 / 通勤客
  when:
    trigger: 顾客试镜后说"不够精神/没有型" / 试衣镜前讲解
    context: 上下装层次与腰部呈现方式
  what:
    action_type: waistline_anchor_decision
    decision_or_action: |
      高腰下装、短外套、半塞衣角、腰带辅助；
      高腰断码时用腰带 / 短外套 / 内外层次制造假腰线，不直接用无腰线替代。
  result:
    success_pattern: 腰线显出后顾客在镜前即说"精神多了"，连带购买配饰可能性提升。
    flip_pattern: 长上衣全盖、低腰下装、宽松直筒裙无收束，顾客觉得"不够精神"。
  underlying_mechanism: |
      腰线是身材比例的视觉锚点；
      没有锚点时整体重心垮塌，多数客群在镜前的第一感觉就是"垮、钝、显大"。
  boundary:
    applicable_when: 显高显瘦显精神诉求 / 试衣镜前演示
    not_applicable_when: 腹部敏感、明确不想强调腰部的顾客
  alternative_path:
    - 高腰下装断码 → 腰带 / 短外套 / 内外层次制造假腰线
    - 不能直接用无腰线下装等效替代

evidence:
  source_md: Q7Q12-搭配陈列业务包/搭配规则包.md
  source_anchor: 6.1 规则 03 waistline_anchor_rule + 6.2 hard_rule
  source_type: explicit_business_rule
  inference_level: low
  evidence_quote: |
    只要顾客诉求是显高、显瘦、显精神，先找腰线。
    门店里大部分"不够精神"不是颜色错，是腰线没出来。
    works_in：高腰下装、短外套、半塞衣角、腰带辅助。
    fails_in：长上衣全盖、低腰下装、宽松直筒裙无收束。
    高腰断码时，可用腰带 / 短外套 / 内外层次制造假腰线；不能直接用无腰线替代。

gate_self_check:
  gate_1_closed_scenario: pass
  gate_2_reverse_infer: pass
  gate_3_rule_generalizable: pass
  gate_4_production_feasible: pass
  notes: G1/G2/G3/G4 全 pass；显高显瘦显精神诉求场景可调用。

brand_layer_review:
