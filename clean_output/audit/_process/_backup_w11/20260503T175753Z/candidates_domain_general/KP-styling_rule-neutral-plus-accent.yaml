pack_id: KP-styling_rule-neutral-plus-accent
schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  顾客怕出错、第一次成交、主推通勤时，先用中性色（米白/灰/驼/藏青）打底，再加一处提气；
  这是软建议——节庆/活动/潮流年轻客群可直接高饱和上身，但要先判断顾客承受力。

scenario:
  who:
    primary_role: 导购 / 店长（尤其新导购第一套安全盘）
    target_audience: 通勤客 / 成熟客 / 初次尝试新色顾客
  when:
    trigger: 顾客明显怕出错 / 初次成交 / 通勤主推 / 安全成交墙布展
    context: 整套主色调选择
  what:
    action_type: neutral_base_plus_accent
    decision_or_action: |
      米白 / 灰 / 驼 / 藏青打底 + 丝巾 / 鞋 / 包 / 内搭一处提气；
      提气色断货时把提气点转移到配饰，不硬改主上装。
  result:
    success_pattern: 出错率低 / 复制率高 / 门店稳定成交，新导购也敢推。
    flip_pattern: 全身都灰都米却没有材质层次，看着"性冷淡 + 没精神"，顾客说不出问题但不下单。
  underlying_mechanism: |
      中性色容错率高，提气点提供视觉记忆点；
      没有材质层次时中性色就只剩"无聊"，需要靠提气点和材质起伏拉回。
  boundary:
    applicable_when: 通勤 / 怕出错顾客 / 安全成交盘 / 新导购默认推荐
    not_applicable_when: 节庆 / 活动 / 多巴胺穿搭 / 潮流年轻客群（可反转，但要先判断顾客承受力）
  alternative_path:
    - 提气色断货 → 提气点转移到配饰，不硬改主上装
    - 顾客承受力允许 → 直接高饱和上身（反转路径）

evidence:
  source_md: Q7Q12-搭配陈列业务包/搭配规则包.md
  source_anchor: 6.1 规则 06 neutral_plus_accent_rule + 6.3 soft_rule + 6.4 反转三
  source_type: explicit_business_rule
  inference_level: low
  evidence_quote: |
    顾客怕出错、第一次成交、主推通勤时，先用中性色打底，再加一处提气。
    works_in：米白 / 灰 / 驼 / 藏青打底，丝巾 / 鞋 / 包 / 内搭提气。
    fails_in：全身都灰、都米，但没有材质层次。
    提气色断货，可把提气点转移到配饰，不要硬改主上装。
    会反转的规则三：节庆、活动、潮流年轻客群允许高饱和、多彩直接上身；但要先判断顾客承受力。

gate_self_check:
  gate_1_closed_scenario: pass
  gate_2_reverse_infer: pass
  gate_3_rule_generalizable: pass
  gate_4_production_feasible: pass
  notes: 八要素齐全；软规则定位清晰；新导购首套盘可直接调用。

