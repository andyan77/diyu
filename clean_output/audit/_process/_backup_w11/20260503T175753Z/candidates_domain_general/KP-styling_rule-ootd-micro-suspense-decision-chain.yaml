  gate_1_closed_scenario: pass
  gate_2_reverse_infer: pass
  gate_3_rule_generalizable: pass
  gate_4_production_feasible: pass
  notes: |
    Gate 1：八要素齐全。
    Gate 2：从 06_rule + 05_relation + 09_call_mapping
    可反推"OOTD 多次换装因果链 / 与 C1-3 卡点变装的边界 / 与 product_review C3-2 顾虑解除的重心区分"。
    Gate 3：跨品牌通用——任意服装品牌可用此玩法做"决策叙事"OOTD。
    Gate 4：可被 content_generation 调用，按"问题-解决链清单"生成因果剪辑节点。

