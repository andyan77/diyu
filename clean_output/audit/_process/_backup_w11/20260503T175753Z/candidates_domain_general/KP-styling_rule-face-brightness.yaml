pack_id: KP-styling_rule-face-brightness
schema_version: candidate_v1
pack_type: styling_rule
brand_layer: domain_general
state: drafted

knowledge_assertion: >-
  离脸最近那一层，优先解决气色，不优先解决时髦——成熟客/黄调肤色/熬夜脸顾客最直观反馈是
  "脸色好不好""我显不显老"；上装缺货可优先替换近脸提亮件，不必整套推翻。

scenario:
  who:
    primary_role: 导购 / 店长
    target_audience: 成熟客 / 黄调肤色 / 熬夜脸 / 第一次试色顾客
  when:
    trigger: 顾客试镜后说"脸色发黄/没精神" / 试色推荐
    context: 整套近脸层（围巾 / 内搭 / 领口 / 耳饰）颜色选择
  what:
    action_type: face_brightness_priority
    decision_or_action: |
      围巾 / 内搭 / 领口 / 耳饰优先选提亮色；
      上装缺货时不整套推翻，先替换近脸提亮件即可。
  result:
    success_pattern: 顾客在镜前说"气色好多了"，可承接连带购买近脸提亮单品。
    flip_pattern: 整体比例都对但近脸颜色发灰发黄，顾客觉得"穿了反而显老"。
  underlying_mechanism: |
      顾客最直观的视觉反馈优先来自脸；
      脸色不对，整体比例和颜色搭配再对也救不回成交动机。
  boundary:
    applicable_when: 成熟客 / 黄调肤色 / 熬夜脸 / 第一次试色场景
    not_applicable_when: 强妆造 / 拍摄型造型（脸已被妆容主导）
  alternative_path:
    - 上装缺货 → 优先替换近脸提亮件，不整套推翻
    - 提亮色断货 → 在围巾/耳饰/内搭多个位置任选其一，不强求同一位置

evidence:
  source_md: Q7Q12-搭配陈列业务包/搭配规则包.md
  source_anchor: 6.1 规则 09 face_brightness_rule + 6.3 soft_rule
  source_type: explicit_business_rule
  inference_level: low
  evidence_quote: |
    离脸最近那一层，优先解决气色，不优先解决时髦。
    顾客最直观的反馈首先是"脸色好不好""我显不显老"。
    works_in：围巾、内搭、领口、耳饰提亮。
    fails_in：整体比例都对，但近脸颜色发灰发黄。
    上装缺货时，可优先替换近脸提亮件，不必整套推翻。

